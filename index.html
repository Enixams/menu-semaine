<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Menu">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2D6A4F">
<title>Menu de la semaine</title>

<!-- Inline SVG icons as data URIs for apple-touch-icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%232D6A4F'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%8D%BD%3C/text%3E%3C/svg%3E">

<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E8E4DC;
  --text: #1A1814;
  --muted: #8A8479;
  --accent: #2D6A4F;
  --accent-light: #E8F4EE;
  --accent-mid: #52B788;
  --danger: #C1440E;
  --danger-light: #FDF0EB;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  position: sticky; top: 0; z-index: 50;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 600; letter-spacing: -.02em; }
header p { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* Nav tabs */
.nav-tabs {
  display: flex; gap: 0;
  background: var(--bg); border-radius: 10px;
  padding: 3px; margin: 12px 16px 0;
}
.nav-tab {
  flex: 1; text-align: center; padding: 7px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border-radius: 8px; cursor: pointer; border: none;
  background: transparent; font-family: inherit;
  transition: background .15s, color .15s;
}
.nav-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

/* Main */
main { padding: 12px 12px calc(var(--safe-bottom) + 80px); }

/* Week grid */
.week-grid {
  display: grid;
  grid-template-columns: 48px repeat(7, minmax(0,1fr));
  gap: 4px;
}
.cell-header {
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-align: center; padding: 5px 2px;
  text-transform: uppercase; letter-spacing: .05em;
}
.row-label {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px;
  font-size: 9px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .05em;
  padding: 4px 0;
}
.row-label .icon { font-size: 14px; }
.meal-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 6px;
  min-height: 68px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 4px;
  transition: border-color .15s;
  -webkit-user-select: none; user-select: none;
}
.meal-cell:active { background: var(--bg); }
.meal-cell.filled { border-color: var(--accent-mid); }
.meal-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; }
.meal-badge {
  font-size: 9px; font-weight: 600;
  background: var(--accent-light); color: var(--accent);
  padding: 2px 5px; border-radius: 20px; width: fit-content;
}
.meal-add {
  margin: auto; text-align: center;
  font-size: 18px; opacity: .25;
}

/* List view */
.list-view { display: none; }
.list-view.active { display: block; }
.grid-view { display: block; }
.grid-view.hidden { display: none; }

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}
.day-card-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.day-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-mid);
}
.slot-row {
  display: flex; align-items: center;
  padding: 10px 14px; gap: 10px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.slot-row:last-child { border-bottom: none; }
.slot-row:active { background: var(--bg); }
.slot-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.slot-label { font-size: 12px; color: var(--muted); width: 36px; flex-shrink: 0; }
.slot-meal { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
.slot-meal.empty { color: var(--muted); font-weight: 400; font-style: italic; }
.slot-arrow { color: var(--muted); font-size: 16px; }

/* Bottom action bar */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px calc(var(--safe-bottom) + 10px);
  display: flex; gap: 8px; z-index: 50;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  cursor: pointer; flex: 1;
  -webkit-user-select: none; user-select: none;
}
.btn:active { background: var(--bg); }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); flex: 2; }
.btn.accent:active { background: #235E44; }
.btn.danger-btn { color: var(--danger); }
.btn.danger-btn:active { background: var(--danger-light); }

/* Modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 0 0 calc(var(--safe-bottom) + 16px);
  width: 100%; max-width: 480px;
  animation: slideup .2s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes slideup { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 10px auto 14px;
}
.modal-body { padding: 0 20px 16px; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
.modal .ctx { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.modal input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  font-family: inherit; font-size: 16px;
  background: var(--bg); color: var(--text);
  outline: none; appearance: none;
}
.modal input:focus { border-color: var(--accent-mid); }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; }
.modal-actions .btn { font-size: 15px; padding: 12px; }

/* Share */
.share-text {
  background: var(--bg); border-radius: 10px;
  padding: 14px; font-size: 13px; line-height: 1.8;
  color: var(--text); white-space: pre-wrap;
  max-height: 300px; overflow-y: auto;
  border: 1px solid var(--border);
  margin-bottom: 12px; font-family: monospace;
}

/* Toast */
.toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%;
  transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 9px 20px; border-radius: 20px;
  font-size: 14px; z-index: 300;
  opacity: 0; transition: opacity .2s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Install banner */
.install-banner {
  background: var(--accent-light);
  border: 1px solid var(--accent-mid);
  border-radius: 12px; margin-bottom: 12px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.install-banner .ib-text { flex: 1; font-size: 13px; line-height: 1.4; color: var(--accent); }
.install-banner .ib-text strong { font-weight: 600; }
.install-banner .ib-close {
  background: none; border: none; font-size: 18px;
  color: var(--accent); cursor: pointer; padding: 0 4px;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>🍽 Menu de la semaine</h1>
      <p id="week-label">Chargement…</p>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('grid')">Grille</button>
    <button class="nav-tab" onclick="switchView('list')">Liste</button>
    <button class="nav-tab" onclick="openShare()">Partager</button>
  </div>
</header>

<main>
  <!-- Install banner -->
  <div class="install-banner" id="install-banner" style="display:none">
    <span style="font-size:24px">📲</span>
    <div class="ib-text" id="install-text"><strong>Installer l'appli</strong><br>...</div>
    <button class="ib-close" onclick="dismissInstall()">✕</button>
  </div>

  <!-- Grid view -->
  <div class="grid-view" id="grid-view">
    <div class="week-grid" id="grid"></div>
  </div>

  <!-- List view -->
  <div class="list-view" id="list-view">
    <div id="list"></div>
  </div>
</main>

<div class="bottom-bar">
  <button class="btn accent" onclick="openAdd()">＋ Ajouter un repas</button>
  <button class="btn danger-btn" onclick="clearAll()">🗑</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAYS_FULL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const SLOTS = ['midi','soir'];
const SLOT_ICONS = { midi: '☀️', soir: '🌙' };

let meals = {};
let currentView = 'grid';
let currentCell = null;

try { meals = JSON.parse(localStorage.getItem('menu-famille-pwa') || '{}'); } catch(e) {}

function save() { try { localStorage.setItem('menu-famille-pwa', JSON.stringify(meals)); } catch(e) {} }
function key(d,s) { return d+'-'+s; }

// Week label
function setWeekLabel() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  document.getElementById('week-label').textContent = `Semaine du ${fmt(monday)} au ${fmt(sunday)}`;
}

// Grid view
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const empty = document.createElement('div'); g.appendChild(empty);
  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cell-header'; h.textContent = d; g.appendChild(h);
  });
  SLOTS.forEach(s => {
    const label = document.createElement('div');
    label.className = 'row-label';
    label.innerHTML = `<span class="icon">${SLOT_ICONS[s]}</span>${s}`;
    g.appendChild(label);
    DAYS.forEach((d,i) => {
      const cell = document.createElement('div');
      cell.className = 'meal-cell' + (meals[key(d,s)] ? ' filled' : '');
      cell.onclick = () => openCell(d, DAYS_FULL[i], s);
      const m = meals[key(d,s)];
      if (m) {
        cell.innerHTML = `<div class="meal-badge">✓</div><div class="meal-name">${m}</div>`;
      } else {
        cell.innerHTML = `<div class="meal-add">+</div>`;
      }
      g.appendChild(cell);
    });
  });
}

// List view
function buildList() {
  const l = document.getElementById('list');
  l.innerHTML = '';
  DAYS_FULL.forEach((dfull,i) => {
    const d = DAYS[i];
    const card = document.createElement('div');
    card.className = 'day-card';
    let html = `<div class="day-card-header"><div class="day-dot"></div>${dfull}</div>`;
    SLOTS.forEach(s => {
      const m = meals[key(d,s)];
      html += `<div class="slot-row" onclick="openCell('${d}','${dfull}','${s}')">
        <span class="slot-icon">${SLOT_ICONS[s]}</span>
        <span class="slot-label">${s.charAt(0).toUpperCase()+s.slice(1)}</span>
        <span class="slot-meal${m?'':' empty'}">${m || 'Non planifié'}</span>
        <span class="slot-arrow">›</span>
      </div>`;
    });
    card.innerHTML = html;
    l.appendChild(card);
  });
}

function switchView(v) {
  currentView = v;
  document.getElementById('grid-view').classList.toggle('hidden', v !== 'grid');
  document.getElementById('list-view').classList.toggle('active', v === 'list');
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['grid','list','share'][i] === v);
  });
  if (v === 'list') buildList();
  if (v === 'share') { switchView(currentView === 'share' ? 'grid' : currentView); openShare(); return; }
}

function openCell(d, dfull, s) {
  currentCell = { d, dfull, s };
  const m = meals[key(d,s)] || '';
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-body">
      <h2>${dfull}</h2>
      <p class="ctx">${SLOT_ICONS[s]} ${s.charAt(0).toUpperCase()+s.slice(1)} · repas rapide</p>
      <input type="text" id="meal-input" placeholder="Ex: Saumon grillé avec riz…" value="${m}" autocomplete="off">
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        ${m ? `<button class="btn danger-btn" onclick="deleteMeal()">Supprimer</button>` : ''}
        <button class="btn accent" onclick="saveCell()">Enregistrer</button>
      </div>
    </div>`);
  setTimeout(() => {
    const inp = document.getElementById('meal-input');
    if (inp) { inp.focus(); inp.select(); }
  }, 250);
}

function openAdd() {
  // Quick-add: pick day and slot
  let opts = '';
  DAYS_FULL.forEach((dfull,i) => {
    SLOTS.forEach(s => {
      if (!meals[key(DAYS[i],s)]) {
        opts += `<div class="slot-row" onclick="openCell('${DAYS[i]}','${dfull}','${s}')">
          <span class="slot-icon">${SLOT_ICONS[s]}</span>
          <span style="font-size:13px;font-weight:500">${dfull} — ${s}</span>
          <span class="slot-arrow" style="margin-left:auto">›</span>
        </div>`;
      }
    });
  });
  if (!opts) { showToast('Tous les créneaux sont remplis !'); return; }
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-body">
      <h2>Quel créneau ?</h2>
      <p class="ctx">Créneaux disponibles cette semaine</p>
    </div>
    <div style="max-height:60vh;overflow-y:auto">${opts}</div>
    <div style="padding:0 20px 4px"><button class="btn" style="width:100%" onclick="closeModal()">Annuler</button></div>`);
}

function saveCell() {
  if (!currentCell) return;
  const inp = document.getElementById('meal-input');
  const val = inp && inp.value.trim();
  if (val) {
    meals[key(currentCell.d, currentCell.s)] = val;
    save();
  }
  closeModal();
  refresh();
}

function deleteMeal() {
  if (!currentCell) return;
  delete meals[key(currentCell.d, currentCell.s)];
  save();
  closeModal();
  refresh();
}

function clearAll() {
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-body">
      <h2>Effacer tout ?</h2>
      <p class="ctx">Cette action supprime tous les repas planifiés.</p>
      <div class="modal-actions" style="margin-top:20px">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn danger-btn" onclick="doClears()">Oui, tout effacer</button>
      </div>
    </div>`);
}

function doClears() {
  meals = {}; save(); closeModal(); refresh();
  showToast('Menu effacé');
}

function openShare() {
  let txt = '🍽 Menu de la semaine\n\n';
  DAYS_FULL.forEach((dfull,i) => {
    const d = DAYS[i];
    const m1 = meals[key(d,'midi')], m2 = meals[key(d,'soir')];
    if (!m1 && !m2) return;
    txt += `📅 ${dfull}\n`;
    if (m1) txt += `  ☀️ Midi : ${m1}\n`;
    if (m2) txt += `  🌙 Soir : ${m2}\n`;
    txt += '\n';
  });
  if (!txt.includes('📅')) txt += '(aucun repas planifié)\n';
  window._shareTxt = txt;
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-body">
      <h2>Partager le menu</h2>
      <p class="ctx">Envoie ce texte par WhatsApp, SMS ou email</p>
      <div class="share-text">${txt.replace(/\n/g,'<br>')}</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Fermer</button>
        <button class="btn accent" onclick="doShare()">Partager ↗</button>
      </div>
    </div>`);
  // Reset tab
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i === 0));
  currentView = 'grid';
}

function doShare() {
  const txt = window._shareTxt || '';
  if (navigator.share) {
    navigator.share({ title: 'Menu de la semaine', text: txt })
      .then(() => { closeModal(); showToast('Partagé !'); })
      .catch(() => copyFallback(txt));
  } else {
    copyFallback(txt);
  }
}

function copyFallback(txt) {
  navigator.clipboard.writeText(txt).then(() => {
    closeModal(); showToast('Copié ✓');
  }).catch(() => showToast('Sélectionne et copie manuellement'));
}

function showModal(html) {
  const overlay = document.getElementById('overlay');
  document.getElementById('modal-content').innerHTML = html;
  overlay.classList.add('open');
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  currentCell = null;
  if (currentView === 'list') buildList();
}

function refresh() {
  buildGrid();
  if (currentView === 'list') buildList();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Install instructions
function showInstallBanner() {
  const banner = document.getElementById('install-banner');
  const txt = document.getElementById('install-text');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isAndroid = /Android/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isStandalone) return;
  if (isIOS) {
    txt.innerHTML = '<strong>Installer sur iPhone</strong><br>Appuie sur <strong>⎙ Partager</strong> puis <strong>« Sur l\'écran d\'accueil »</strong>';
    banner.style.display = 'flex';
  } else if (isAndroid) {
    txt.innerHTML = '<strong>Installer sur Android</strong><br>Appuie sur <strong>⋮ Menu</strong> puis <strong>« Ajouter à l\'écran d\'accueil »</strong>';
    banner.style.display = 'flex';
  }
}

function dismissInstall() {
  document.getElementById('install-banner').style.display = 'none';
  try { localStorage.setItem('install-dismissed', '1'); } catch(e) {}
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
setWeekLabel();
buildGrid();
if (!localStorage.getItem('install-dismissed')) showInstallBanner();
</script>

<!-- Service Worker pour mode hors-ligne -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'menu-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/'))));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
